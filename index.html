<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Instant Replay Ping Pong</title>
  <style>
    body { font-family: Arial; text-align: center; background:#111; color:white; }
    video { width: 80%; max-width: 600px; margin: 10px; border-radius: 10px; }
    button { padding: 10px 15px; margin: 5px; font-size: 16px; }
  </style>
</head>
<body>

<h1>🏓 Instant Replay</h1>

<h3>Live</h3>
<video id="live" autoplay muted playsinline></video>

<h3>Replay</h3>
<video id="replay" controls></video>

<div>
  <button onclick="startReplay()">🎬 Replay (5s)</button>
</div>

<script>
let mediaRecorder;
let chunks = [];
let buffer = [];

const live = document.getElementById("live");
const replay = document.getElementById("replay");

// 1. Caméra
navigator.mediaDevices.getUserMedia({ video: true, audio: false })
.then(stream => {
  live.srcObject = stream;

  // 2. Enregistrement en continu
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });

  mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) {
      buffer.push(e.data);

      // garder seulement ~5 secondes
      if (buffer.length > 25) { // approx (dépend du timeslice)
        buffer.shift();
      }
    }
  };

  // capture toutes les 200ms
  mediaRecorder.start(200);

})
.catch(err => alert(err));

// 3. Replay
function startReplay() {
  const blob = new Blob(buffer, { type: 'video/webm' });
  const url = URL.createObjectURL(blob);

  replay.src = url;
  replay.playbackRate = 0.5; // ralenti
  replay.play();
}
</script>

</body>
</html>
