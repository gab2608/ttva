<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ping Pong Instant Replay</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

h1 {
  margin: 15px;
}

video {
  width: 80%;
  max-width: 650px;
  border-radius: 12px;
  background: black;
  margin: 10px 0;
}

.controls {
  margin: 15px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

.start { background: #22c55e; }
.stop { background: #ef4444; }
.replay { background: #3b82f6; }
</style>
</head>

<body>

<h1>🏓 Instant Replay Ping Pong</h1>

<!-- LIVE -->
<video id="live" autoplay muted playsinline></video>

<!-- REPLAY -->
<video id="replay" controls></video>

<!-- CONTROLS -->
<div class="controls">
  <button class="start" onclick="startCamera()">▶ Start</button>
  <button class="stop" onclick="stopCamera()">⏹ Stop</button>
  <button class="replay" onclick="playReplay()">🎬 Replay 5s</button>
</div>

<script>
let stream;
let recorder;
let chunks = [];

const live = document.getElementById("live");
const replay = document.getElementById("replay");

// ▶ START CAMERA + RECORD BUFFER
async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
  live.srcObject = stream;

  chunks = [];

  let options = {};

  if (MediaRecorder.isTypeSupported("video/webm;codecs=vp8")) {
    options.mimeType = "video/webm;codecs=vp8";
  }

  recorder = new MediaRecorder(stream, options);

  recorder.ondataavailable = (e) => {
    if (e.data.size > 0) {
      chunks.push(e.data);

      // garder ~5 secondes
      if (chunks.length > 25) {
        chunks.shift();
      }
    }
  };

  recorder.start(200);
}

// ⏹ STOP CAMERA
function stopCamera() {
  if (recorder && recorder.state !== "inactive") {
    recorder.stop();
  }

  if (stream) {
    stream.getTracks().forEach(t => t.stop());
  }

  live.srcObject = null;
}

// 🎬 REPLAY
function playReplay() {
  if (chunks.length === 0) {
    alert("Attends quelques secondes de vidéo !");
    return;
  }

  const blob = new Blob(chunks, { type: "video/webm" });
  const url = URL.createObjectURL(blob);

  replay.src = url;
  replay.playbackRate = 0.5; // ralenti
  replay.play();
}
</script>

</body>
</html>
